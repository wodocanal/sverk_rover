usb_camera_node:
  ros__parameters:
    device: /dev/video0
    image_topic: /camera/image_raw
    compressed_image_topic: /camera/image_raw/compressed
    frame_id: camera_optical_frame
    width: 1280
    height: 720
    fps: 30.0
    use_mjpeg: true
    publish_raw: true
    publish_compressed: true
    jpeg_quality: 85
    reconnect_interval_sec: 2.0
    get_frame_service: get_frame
