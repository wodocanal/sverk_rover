web_gateway_node:
  ros__parameters:
    bind_address: 127.0.0.1
    port: 8765
    plans_directory: ~/.local/share/sverh-rover-web/plans

    # Current architecture publishes directly to /cmd_vel. If twist_mux is
    # enabled later, change this to /cmd_vel_teleop and motion commands to the
    # chosen mux input in one controlled change.
    command_topic: /cmd_vel
    web_command_topic: /web/cmd_vel
    web_command_timeout_sec: 0.20
    rosbridge_url: ''
    rosbridge_port: 9090
    rosbridge_path: /
    terminal_enabled: false
    terminal_url: ''
    terminal_port: 7681
    terminal_path: /
    odom_topic: /odom
    wheel_odom_topic: /wheel/odometry
    imu_topic: /imu/data
    diagnostics_topic: /diagnostics

    activity_limit: 1000
    stop_hold_sec: 0.75
