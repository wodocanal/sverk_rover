web_gateway_node:
  ros__parameters:
    bind_address: 0.0.0.0
    port: 8765

    command_topic: /cmd_vel
    camera_node_name: /usb_camera_node
    vision_node_name: /camera_detector_node
    lidar_node_name: /sllidar_node
    led_strip_node_name: /led_strip_node
    octoliner_node_name: /octoliner_node
    drive_command_timeout_sec: 0.25
    default_linear_speed_mps: 0.18
    default_lateral_speed_mps: 0.16
    default_angular_speed_radps: 0.70
    max_linear_speed_mps: 0.35
    max_lateral_speed_mps: 0.35
    max_angular_speed_radps: 1.50

    plans_directory: ~/.local/share/sverh-rover-web/plans
    hackathon_files_root: ~/sverk_rover/hackathon_files
    terminal_enabled: true
    terminal_url: ''
    terminal_port: 7681
    terminal_path: /
    rosboard_enabled: true
    rosboard_port: 8888

    odom_topic: /odom
    wheel_odom_topic: /wheel/odometry
    imu_topic: /imu/data
    diagnostics_topic: /diagnostics

    activity_limit: 1000
    stop_hold_sec: 0.75
