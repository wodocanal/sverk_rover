<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rover Web</title>
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <main class="hero">
    <div class="hero-card">
      <p class="eyebrow">Raspberry Pi Rover</p>
      <h1>Hello, world!</h1>
      <p class="message">
        Новый веб-интерфейс для ровера запущен. Это чистый стартовый экран,
        доступный с других устройств в локальной сети.
      </p>
      <div class="status-row">
        <span class="label">Status</span>
        <span class="badge">Online</span>
      </div>
      <div class="status-row">
        <span class="label">Endpoint</span>
        <code id="origin-label">loading…</code>
      </div>
      <div class="status-row">
        <span class="label">Hostname</span>
        <code id="hostname-label">loading…</code>
      </div>
      <div class="status-row">
        <span class="label">IPv4</span>
        <code id="ip-label">loading…</code>
      </div>
    </div>
  </main>

  <script>
    const originLabel = document.getElementById('origin-label');
    const hostnameLabel = document.getElementById('hostname-label');
    const ipLabel = document.getElementById('ip-label');

    originLabel.textContent = window.location.origin;

    fetch('/api/identity', { cache: 'no-store' })
      .then((response) => response.json())
      .then((payload) => {
        hostnameLabel.textContent = payload.hostname || 'unknown';
        const addresses = Array.isArray(payload.ip_addresses) ? payload.ip_addresses : [];
        ipLabel.textContent = addresses.length ? addresses.join(', ') : 'not detected';
      })
      .catch(() => {
        hostnameLabel.textContent = 'unavailable';
        ipLabel.textContent = 'unavailable';
      });
  </script>
</body>
</html>
