<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hackathon HTML Example</title>
  <style>
    body {
      margin: 0;
      padding: 32px;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      background: #f4f9fc;
      color: #111820;
    }

    .card {
      max-width: 860px;
      margin: 0 auto;
      padding: 28px;
      border: 1px solid #c8dce7;
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 12px 32px rgba(30, 91, 119, 0.10);
    }

    h1 {
      margin-top: 0;
      color: #075f89;
    }

    ul {
      line-height: 1.6;
    }

    .badge {
      display: inline-block;
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid #91cfe7;
      background: #e4f8ff;
      color: #075f89;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>HTML-пример для Rover</h1>
    <p>Этот файл нужен, чтобы проверить отображение HTML-документов на странице <strong>Хакатон</strong>.</p>
    <ul>
      <li>Здесь может быть краткий регламент.</li>
      <li>Или описание конкурсного задания.</li>
      <li>Или карточка сценария для демонстрации робота.</li>
    </ul>
    <div class="badge">HTML preview test</div>
  </div>
</body>
</html>
